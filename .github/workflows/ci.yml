name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: install
        # Install from uv.lock so tool versions (ruff, mypy, pytest) are
        # pinned and deterministic. `uv pip install -e ".[dev]"` ignored the
        # lock and pulled the newest ruff, whose format rules drifted from
        # the locked version and turned CI red repo-wide.
        run: uv sync --frozen --extra dev

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy

      - name: pytest
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # Frontend lands in M4. Keep the job declared so branch protection rules stay stable.
      - name: placeholder
        run: echo "frontend lands in M4"
