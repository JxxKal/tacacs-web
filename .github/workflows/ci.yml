name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: install
        run: uv pip install --system -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy

      - name: pytest
        run: pytest -q

  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # Frontend lands in M4. Keep the job declared so branch protection rules stay stable.
      - name: placeholder
        run: echo "frontend lands in M4"
