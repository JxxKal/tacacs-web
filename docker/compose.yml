# tacacs-web stack — single-host deployment, comfortable to run as a
# Portainer stack (Git-repository method) or via plain `docker compose`.
#
# Secrets are passed as environment variables so Portainer's stack
# editor can manage them natively (standalone Docker has no Swarm secret
# store). Required env — set in Portainer's "Environment variables" panel
# or in docker/.env (see .env.example):
#
#   POSTGRES_PASSWORD   DB password (used by both `db` and `backend`)
#   MASTER_KEY          AES-GCM master key, base64 of 32 bytes
#   TACACS_SHARED_SECRET  catch-all NAS secret (M2)
#   BASE_URL            external https URL
#
# Prefer mounting the master key as a file instead of an env var? See
# DEPLOY.md §3.8 — set master_key_file / database_password_file and add
# a bind mount; the app reads the file first when present.
#
# All services log structured JSON on stdout.

name: tacacs-web

x-common-env: &common-env
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  TZ: ${TZ:-UTC}

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      <<: *common-env
      POSTGRES_DB: ${POSTGRES_DB:-tacacs}
      POSTGRES_USER: ${POSTGRES_USER:-tacacs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tacacs} -d ${POSTGRES_DB:-tacacs}"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  backend:
    # Explicit tag so `docker compose build` produces a stable image name
    # the Portainer Web-editor compose can reference (docker/compose.portainer.yml).
    image: tacacs-web/backend:local
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-tacacs}@db:5432/${POSTGRES_DB:-tacacs}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY must be set (base64 of 32 bytes)}
      BASE_URL: ${BASE_URL:-https://localhost:8443}
    volumes:
      - tls-state:/var/lib/tacacs-web/tls
      # Shared with the tac_plus-ng container; backend writes the
      # rendered hosts.cfg here, the daemon-side inotify sidecar
      # SIGHUPs tac_plus-ng on every change.
      - tac-plus-ng-config:/var/lib/tacacs-web/tac_plus-ng
      # Shared with the tac_plus-ng container; daemon writes the
      # accounting log here, the backend's ingestor tails it.
      - tac-plus-ng-acct:/var/log/tac_plus-ng
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  tac_plus-ng:
    image: tacacs-web/tac_plus-ng:local
    build:
      context: ..
      dockerfile: docker/tac_plus-ng/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      <<: *common-env
      TACACS_SHARED_SECRET: ${TACACS_SHARED_SECRET:?TACACS_SHARED_SECRET must be set}
      # The MAVIS child POSTs each AUTH packet to the backend; DB + master
      # key live there, not here.
      TACACS_BACKEND_URL: http://backend:8000
    volumes:
      # Shared with the backend; the backend writes hosts.cfg here, the
      # entrypoint's inotify loop watches the directory and SIGHUPs the
      # daemon on change.
      - tac-plus-ng-config:/etc/tac_plus-ng/dynamic
      # Daemon writes the accounting log here; backend's ingestor tails it.
      - tac-plus-ng-acct:/var/log/tac_plus-ng
    ports:
      - "${TACACS_BIND_ADDR:-0.0.0.0}:49:49/tcp"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 49 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal

  # OpenLDAP harness used by the `integration` profile to drive the live-bind
  # path of the MAVIS handler end-to-end. Not part of the production stack —
  # operators point the real AD/LDAPS endpoint at the backend instead.
  openldap:
    # Bitnami retired the `bitnami/openldap:2.6` tag from Docker Hub in 2025
    # (manifest unknown); the archived image lives in the legacy registry with
    # an identical env-var contract.
    image: bitnamilegacy/openldap:2.6
    profiles: [integration]
    environment:
      LDAP_ADMIN_USERNAME: admin
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD:-adminpass}
      LDAP_ROOT: dc=corp,dc=example
      # `LDAP_USER_DC` is deprecated in bitnami openldap 2.6.x and triggers a
      # duplicate-entry crash (exit 68) during default-tree creation; the
      # current var lands users under the same ou=users,<root> DN.
      LDAP_USER_OU: users
      LDAP_USERS: ${LDAP_TEST_USER:-smokeuser}
      LDAP_PASSWORDS: ${LDAP_TEST_PASSWORD:-hunter2}
      LDAP_PORT_NUMBER: "1389"
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost:1389 -b dc=corp,dc=example -s base >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - internal

  nginx:
    image: tacacs-web/nginx:local
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      <<: *common-env
      UPSTREAM_BACKEND: backend:8000
    volumes:
      # Bootstrap entrypoint writes a self-signed cert here on first start;
      # M7's upload flow also persists the operator-supplied cert through
      # this volume. Mount rw so both code paths work.
      - tls-state:/etc/nginx/tls
    ports:
      # HTTPS is the only listener exposed to the host. The container still
      # answers on 8443 internally; HTTPS_HOST_PORT controls the host-side
      # mapping for environments where 8443 is already in use.
      - "${HTTPS_BIND_ADDR:-0.0.0.0}:${HTTPS_HOST_PORT:-8443}:8443"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-k", "https://localhost:8443/healthz/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - internal

volumes:
  postgres-data:
  tls-state:
  tac-plus-ng-config:
  tac-plus-ng-acct:

networks:
  internal:
    driver: bridge
